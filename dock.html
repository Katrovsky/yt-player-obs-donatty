<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Player Dock</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f11;
      --surface: #17171a;
      --surface2: #1e1e22;
      --border: #2a2a30;
      --border2: #333339;
      --txt: #e8e8ed;
      --txt2: #7e7e8f;
      --txt3: #4a4a58;
      --accent: #5b6af0;
      --accent2: #3d4ed4;
      --amber: #f59e0b;
      --red: #f04f4f;
      --gold: #f0b429;
      --green: #34c77b;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--txt);
      font-family: 'DM Sans', sans-serif;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    /* ── Track card ── */
    .track-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .track-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
    }

    .track-row+.track-row {
      border-top: 1px solid var(--border);
    }

    .track-label {
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--txt3);
      width: 28px;
      flex-shrink: 0;
    }

    .track-info {
      flex: 1;
      min-width: 0;
    }

    .track-title {
      font-size: 0.8rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-meta {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 1px;
    }

    .track-by {
      font-size: 0.68rem;
      color: var(--txt2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-badge {
      font-size: 0.55rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 1px 4px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .badge-paid {
      background: rgba(240, 180, 41, 0.15);
      color: var(--gold);
    }

    .badge-playlist {
      background: rgba(91, 106, 240, 0.15);
      color: var(--accent);
    }

    .rm-btn {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--txt3);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: border-color .12s, color .12s;
    }

    .rm-btn:hover {
      border-color: var(--red);
      color: var(--red);
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .ctrl {
      width: 36px;
      height: 32px;
      border-radius: 7px;
      border: 1px solid var(--border2);
      background: var(--surface);
      color: var(--txt2);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color .12s, background .12s, color .12s, transform .08s;
    }

    .ctrl:hover {
      background: var(--surface2);
      color: var(--txt);
    }

    .ctrl:active {
      transform: scale(0.93);
    }

    .ctrl.play {
      width: 48px;
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .ctrl.play:hover {
      background: var(--accent2);
      border-color: var(--accent2);
    }

    .ctrl.play.paused {
      background: var(--amber);
      border-color: var(--amber);
    }

    .ctrl.play.paused:hover {
      background: #d97706;
      border-color: #d97706;
    }

    /* ── Overlay mode ── */
    .overlay-row {
      display: flex;
      gap: 4px;
    }

    .ov-btn {
      flex: 1;
      height: 26px;
      border-radius: 5px;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--txt2);
      font-size: 0.7rem;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      white-space: nowrap;
      transition: border-color .15s, color .15s, background .15s;
    }

    .ov-btn:hover {
      border-color: var(--accent);
      color: var(--txt);
    }

    .ov-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .section-label {
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--txt3);
      margin-bottom: 4px;
    }

    .mod-banner {
      display: none;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      background: color-mix(in srgb, var(--gold) 10%, var(--surface));
      border: 1px solid color-mix(in srgb, var(--gold) 30%, transparent);
      border-radius: 7px;
      cursor: pointer;
      transition: background .15s;
    }

    .mod-banner:hover {
      background: color-mix(in srgb, var(--gold) 16%, var(--surface));
    }

    .mod-banner.visible {
      display: flex;
    }

    .mod-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 5px var(--gold);
      flex-shrink: 0;
    }

    .mod-banner-text {
      font-size: 0.7rem;
      color: var(--gold);
      flex: 1;
    }

    .mod-banner-count {
      font-size: 0.68rem;
      font-family: 'DM Mono', monospace;
      font-weight: 600;
      color: var(--gold);
    }

    .mod-panel {
      display: none;
    }

    .mod-panel.visible {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .mod-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
    }

    .mod-card-title {
      font-size: 0.78rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }

    .mod-card-title a {
      color: var(--txt);
      text-decoration: none;
    }

    .mod-card-title a:hover {
      color: var(--accent);
    }

    .mod-card-meta {
      font-size: 0.68rem;
      color: var(--txt2);
      margin-bottom: 3px;
    }

    .mod-card-reason {
      font-size: 0.65rem;
      color: var(--amber);
      font-family: 'DM Mono', monospace;
      margin-bottom: 6px;
    }

    .mod-card-actions {
      display: flex;
      gap: 5px;
    }

    .mod-approve {
      flex: 1;
      height: 26px;
      border-radius: 5px;
      background: color-mix(in srgb, var(--green) 15%, transparent);
      border: 1px solid color-mix(in srgb, var(--green) 40%, transparent);
      color: var(--green);
      font-size: 0.7rem;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: background .15s;
    }

    .mod-approve:hover {
      background: color-mix(in srgb, var(--green) 25%, transparent);
    }

    .mod-approve:disabled {
      opacity: .45;
      cursor: not-allowed;
    }

    .mod-reject {
      flex: 1;
      height: 26px;
      border-radius: 5px;
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--txt2);
      font-size: 0.7rem;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }

    .mod-reject:hover {
      border-color: var(--red);
      color: var(--red);
    }

    .mod-reject:disabled {
      opacity: .45;
      cursor: not-allowed;
    }
  </style>
</head>

<body>

  <!-- Now / Next -->
  <div class="track-card">
    <div class="track-row">
      <span class="track-label">Now</span>
      <div class="track-info">
        <div class="track-title" id="npTitle">—</div>
        <div class="track-meta">
          <span class="track-by" id="npBy">—</span>
          <span class="track-badge badge-paid" id="npBadgePaid" style="display:none">paid</span>
          <span class="track-badge badge-playlist" id="npBadgePlaylist" style="display:none">playlist</span>
        </div>
      </div>
    </div>
    <div class="track-row" id="nextRow" style="display:none">
      <span class="track-label">Next</span>
      <div class="track-info">
        <div class="track-title" id="nxTitle">—</div>
        <div class="track-meta">
          <span class="track-by" id="nxBy">—</span>
          <span class="track-badge badge-paid" id="nxBadgePaid" style="display:none">paid</span>
          <span class="track-badge badge-playlist" id="nxBadgePlaylist" style="display:none">playlist</span>
        </div>
      </div>
      <button class="rm-btn" onclick="api.rm(0)" title="Remove">
        <svg width="8" height="8" viewBox="0 0 24 24" fill="none">
          <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />
        </svg>
      </button>
    </div>
  </div>

  <!-- Playback controls -->
  <div class="controls">
    <div class="ctrl" onclick="api.cmd('previous')">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
        <path d="M19 18V6L9 12L19 18ZM21 18V6H19V18H21Z" fill="currentColor" />
      </svg>
    </div>
    <div class="ctrl play" id="ppBtn" onclick="api.pp()">
      <svg id="ppIcon" width="14" height="14" viewBox="0 0 24 24" fill="none">
        <path d="M8 5V19L19 12L8 5Z" fill="currentColor" />
      </svg>
    </div>
    <div class="ctrl" onclick="api.cmd('next')">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
        <path d="M5 18V6L15 12L5 18ZM3 18V6H5V18H3Z" fill="currentColor" />
      </svg>
    </div>
  </div>

  <!-- Moderation -->
  <div class="mod-banner" id="modBanner" onclick="mod.toggle()">
    <div class="mod-dot"></div>
    <span class="mod-banner-text">Pending review</span>
    <span class="mod-banner-count" id="modCount">0</span>
  </div>
  <div class="mod-panel" id="modPanel"></div>

  <!-- Overlay mode -->
  <div>
    <div class="section-label">Overlay mode</div>
    <div class="overlay-row">
      <button class="ov-btn" id="ovNp" onclick="overlay.set('nowplaying')">Now Playing</button>
      <button class="ov-btn" id="ovVideo" onclick="overlay.set('video')">Video</button>
    </div>
  </div>

  <script>
    let ws, currSt = 'stopped';
    const base = window.location.origin;

    const api = {
      async fetch(path, opts = {}) {
        try {
          const r = await fetch(base + path, opts);
          return await r.json();
        } catch (e) { return { success: false }; }
      },
      async cmd(c) { await this.fetch(`/api/${c}`, { method: 'POST' }); },
      async pp() { await this.cmd(currSt === 'playing' ? 'pause' : 'play'); },
      async rm(i) { await this.fetch(`/api/remove?index=${i}`, { method: 'POST' }); },
    };

    const overlay = {
      async init() {
        const d = await api.fetch('/api/overlay/mode');
        if (d.success) this.render(d.data.mode);
      },
      async set(mode) {
        const d = await api.fetch(`/api/overlay/set?mode=${mode}`, { method: 'POST' });
        if (d.success) this.render(d.data.mode);
      },
      render(mode) {
        document.getElementById('ovNp').classList.toggle('active', mode === 'nowplaying');
        document.getElementById('ovVideo').classList.toggle('active', mode === 'video');
      },
    };

    function setTrack(prefix, t) {
      document.getElementById(prefix + 'Title').textContent = t ? t.title : '—';
      document.getElementById(prefix + 'By').textContent = t ? (t.added_by || 'Unknown') : '—';
      document.getElementById(prefix + 'BadgePaid').style.display = (t && t.is_paid) ? 'inline-block' : 'none';
      document.getElementById(prefix + 'BadgePlaylist').style.display = (t && t.added_by === 'Playlist' && !t.is_paid) ? 'inline-block' : 'none';
    }

    function update(d) {
      currSt = d.action || 'stopped';

      if (d.overlay_mode) overlay.render(d.overlay_mode);
      if (d.pending_moderation !== undefined) mod.update(d.pending_moderation);

      setTrack('np', d.current);

      const qu = d.queue || [];
      const pos = d.position || 0;
      const next = qu[pos + 1];
      document.getElementById('nextRow').style.display = next ? 'flex' : 'none';
      if (next) setTrack('nx', next);

      const btn = document.getElementById('ppBtn');
      const icon = document.getElementById('ppIcon');
      if (currSt === 'playing') {
        btn.classList.remove('paused');
        icon.innerHTML = '<path d="M14 19V5H18V19H14ZM6 19V5H10V19H6Z" fill="currentColor"/>';
      } else {
        btn.classList.add('paused');
        icon.innerHTML = '<path d="M8 5V19L19 12L8 5Z" fill="currentColor"/>';
      }
    }

    function connect() {
      ws = new WebSocket('ws://' + location.host + '/ws');
      ws.onmessage = e => { try { update(JSON.parse(e.data)); } catch (_) { } };
      ws.onclose = () => setTimeout(connect, 3000);
      ws.onerror = () => { };
    }

    const mod = {
      _items: [],
      _open: false,
      toggle() {
        this._open = !this._open;
        document.getElementById('modPanel').classList.toggle('visible', this._open);
        if (this._open) this._render();
      },
      update(items) {
        this._items = items || [];
        const banner = document.getElementById('modBanner');
        const count = document.getElementById('modCount');
        if (!banner) return;
        if (this._items.length === 0) {
          banner.classList.remove('visible');
          document.getElementById('modPanel').classList.remove('visible');
          this._open = false;
          return;
        }
        banner.classList.add('visible');
        count.textContent = this._items.length;
        if (this._open) this._render();
      },
      _render() {
        const panel = document.getElementById('modPanel');
        panel.innerHTML = this._items.map(d => `
        <div class="mod-card" id="mod-${d.id}">
          <div class="mod-card-title"><a href="https://www.youtube.com/watch?v=${d.video_id}" target="_blank">${d.video_title}</a></div>
          <div class="mod-card-meta">${d.display_name} · ${d.amount}₽</div>
          <div class="mod-card-reason">${d.reason}</div>
          <div class="mod-card-actions">
            <button class="mod-approve" id="mod-a-${d.id}" onclick="mod.approve('${d.id}')">Approve</button>
            <button class="mod-reject"  id="mod-r-${d.id}" onclick="mod.reject('${d.id}')">Reject</button>
          </div>
        </div>`).join('');
      },
      async approve(id) {
        this._setBusy(id, true);
        const d = await api.fetch(`/api/moderation/approve?id=${id}`, { method: 'POST' });
        if (!d.success) { alert(d.message); this._setBusy(id, false); return; }
        document.getElementById(`mod-${id}`)?.remove();
        await this._refresh();
      },
      async reject(id) {
        this._setBusy(id, true);
        const d = await api.fetch(`/api/moderation/reject?id=${id}`, { method: 'POST' });
        if (!d.success) { alert(d.message); this._setBusy(id, false); return; }
        document.getElementById(`mod-${id}`)?.remove();
        await this._refresh();
      },
      _setBusy(id, v) {
        const a = document.getElementById(`mod-a-${id}`);
        const r = document.getElementById(`mod-r-${id}`);
        if (a) a.disabled = v;
        if (r) r.disabled = v;
      },
      async _refresh() {
        const d = await api.fetch('/api/moderation/pending');
        if (d.success) this.update(d.data);
      },
    };

    window.addEventListener('load', () => { connect(); overlay.init(); mod._refresh(); });
  </script>
</body>

</html>
